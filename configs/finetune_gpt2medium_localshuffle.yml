training_arguments:
  output_dir: "./models/gpt2-medium-finetune-localshuffle"
  logging_dir: "./logs/gpt2-medium-finetune-localshuffle"

  # Stage 2 is finetuning an already-pretrained model, so a lower learning rate is appropriate.
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 500

  per_device_train_batch_size: 128
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 4

  # Finetuning typically needs fewer epochs than pretraining.
  # Start with 3-5 and adjust based on how eval loss behaves.
  num_train_epochs: 5
  max_steps: -1

  weight_decay: 0.01
  max_grad_norm: 1.0

  eval_strategy: "steps"
  eval_steps: 250

  logging_strategy: "steps"
  logging_steps: 50
  logging_first_step: true

  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 2

  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

  # Precision settings — bf16/tf32 assume a modern GPU (A100, H100, etc.).
  # On older GPUs (V100) switch to fp16: true and remove bf16/tf32.
  bf16: true
  tf32: true
  fp16: false

  optim: "adamw_torch_fused"

  dataloader_num_workers: 16
  dataloader_pin_memory: true
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 2

  # Label smoothing can help finetuning on a relatively small dataset.
  label_smoothing_factor: 0.1

  remove_unused_columns: false
  group_by_length: false
  label_names: ["labels"]
  use_cpu: false
  gradient_checkpointing: false
  report_to: "tensorboard"
